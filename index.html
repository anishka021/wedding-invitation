<html lang="en">

<head>

</head>

<body>

<div class="overlay">

<h3>!! Shri Ganeshay Namah !!</h3>

<h2>The Auspicious Wedding Ceremony Of</h2>

<h2>&</h2>

<p class="date">Sunday, 19 April 2026</p>

<p>Dinner & Barat Reception : 7:00 PM onwards</p>

<p class="vidaai">Vidaai taro ki chaoon mein</p>

<h2>Venue</h2>

<script>

var weddingDate = new Date("April 19, 2026 19:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();

var distance = weddingDate - now;

var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
days + " Days " + hours + " Hours " + minutes + " Minutes Remaining";

},1000);

function rsvp(){
alert("Thank you for confirming your presence ❤️");
}

</script>
