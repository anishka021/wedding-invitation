<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Kajal & Vibhor</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bright-gold: #FFD700;
            --genda-orange: #FF7F00;
            --maroon: #800000;
            --peacock-blue: #0047AB;
            --cream: #FFFDF5;
            --deep-red: #B22222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle, #2c0000 0%, #100000 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Animated Background Particles */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: repeating-linear-gradient(45deg, rgba(255,127,0,0.05), rgba(255,127,0,0.05) 1px, transparent 1px, transparent 10px);
        }

        /* Main Invitation Card */
        .card {
            background: var(--cream);
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            border: 15px solid transparent;
            border-image: linear-gradient(to right, var(--deep-red), var(--genda-orange), var(--deep-red)) 30;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 100px rgba(212, 175, 55, 0.1);
            animation: cardEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow: hidden;
        }

        /* Decorative Торан (Top Border) */
        .toran {
            width: 100%;
            height: 60px;
            background-image: radial-gradient(var(--genda-orange) 20%, transparent 20%);
            background-size: 30px 30px;
            position: absolute;
            top: 0; left: 0;
            opacity: 0.3;
        }

        .ganesh-icon {
            font-family: 'Cinzel', serif;
            color: var(--maroon);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: block;
            letter-spacing: 3px;
            animation: glow 3s infinite alternate;
        }

        .intro-text {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: #555;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--deep-red);
            margin: 10px 0;
            line-height: 1.2;
            text-shadow: 1px 1px 0px var(--bright-gold);
            animation: fadeIn 2s ease-in;
        }

        .upp-tag {
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            color: var(--genda-orange);
            font-weight: 600;
        }

        /* Main Image and Peacock Frame */
        .image-container {
            position: relative;
            margin: 20px 0;
            padding: 10px;
            border-radius: 10px;
            background-color: var(--maroon);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid var(--bright-gold);
        }

        .wedding-illustration {
            width: 100%;
            border-radius: 5px;
            filter: contrast(1.1);
            transition: 0.4s;
        }

        .peacock-icon {
            position: absolute;
            top: -20px;
            left: -20px;
            color: var(--peacock-blue);
            font-size: 2.5rem;
            animation: shimmer 1s infinite;
        }

        /* Event Details */
        .event-box {
            border: 1px solid var(--genda-orange);
            padding: 15px;
            margin: 20px 0;
            background: rgba(255, 127, 0, 0.05);
        }

        .date {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--deep-red);
            margin: 5px 0;
        }

        .venue-title {
            color: var(--bright-gold);
            font-weight: 700;
            margin-top: 15px;
            text-decoration: underline;
        }

        /* Animations */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0%, 100% { color: var(--peacock-blue); }
            50% { color: var(--bright-gold); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px var(--maroon); }
            to { text-shadow: 0 0 10px var(--bright-gold); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .names { font-size: 2.8rem; }
            .card { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <div class="bg-decoration"></div>

    <div class="card">
        <div class="toran"></div>
        
        <span class="ganesh-icon">ॐ Shri Ganeshay Namah ॐ</span>
        
        <p class="intro-text">The Auspicious Wedding Ceremony Of</p>
        
        <h1 class="names">
            Kajal Mavi <br> & <br> Vibhor Bhati
        </h1>
        <p class="upp-tag">(UPP)</p>

        <div class="image-container">
            <span class="peacock-icon">🦚</span>
            <img src="https://tse1.mm.bing.net/th/id/OIP.OZBz1cVtHuAi4JOajS3TegHaHa?pid=Api&h=220&P=0" alt="Kajal and Vibhor" class="wedding-illustration">
        </div>

        <div class="event-box">
            <p style="letter-spacing: 2px; font-weight: 600;">AUSPICIOUS DATES</p>
            <p class="date">Sunday, 19 April 2026</p>
            <p>Reception: 7:00 PM onwards</p>
            <p style="font-style: italic; font-size: 0.9rem; margin-top: 5px;">"Vidaai taro ki chaoon mein"</p>
        </div>

        <div class="venue">
            <p class="venue-title">VENUE</p>
            <p><strong>CHAIRMAN FARM HOUSE</strong></p>
            <p style="font-size: 0.9rem;">Mandoli Road, Loni, Ghaziabad (U.P.)</p>
        </div>
    </div>

</body>
</html>
